# ──────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────
components:

  # ============================================
  # SECURITY SCHEMES
  # ============================================
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth2 access token (JWT).
    clientBasic:
      type: http
      scheme: basic
      description: HTTP Basic with client_id as username and client_secret as password.
    clientPost:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Client credentials via POST body (client_id & client_secret in form-urlencoded body).
        This is a logical scheme; actual credentials are in the request body.

  # ============================================
  # REUSABLE PARAMETERS
  # ============================================
  parameters:
    ClientIdPath:
      name: clientId
      in: path
      required: true
      schema:
        type: string
      description: The OAuth2 client ID.
    RoleIdPath:
      name: roleId
      in: path
      required: true
      schema:
        type: integer
        format: int32
      description: The application role ID.
    ThemeIdPath:
      name: themeId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: The theme ID.
    ConfigIdPath:
      name: configId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: The theme configuration entry ID.

  # ============================================
  # SCHEMAS
  # ============================================
  schemas:

    # ── Standard OAuth2 / OIDC Responses ──

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: The access token.
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Lifetime in seconds.
        refresh_token:
          type: string
          description: The refresh token (if issued).
        scope:
          type: string
          description: Granted scopes (space-delimited).
        id_token:
          type: string
          description: OIDC ID Token (if openid scope requested).

    OAuth2Error:
      type: object
      properties:
        error:
          type: string
          description: Error code (e.g., invalid_grant, invalid_request).
        error_description:
          type: string
          description: Human-readable description of the error.
        error_uri:
          type: string
          description: URI identifying the error.

    IntrospectionResponse:
      type: object
      properties:
        active:
          type: boolean
          description: Whether the token is active.
        scope:
          type: string
        client_id:
          type: string
        username:
          type: string
        token_type:
          type: string
        exp:
          type: integer
          format: int64
          description: Expiration timestamp (epoch seconds).
        iat:
          type: integer
          format: int64
          description: Issued-at timestamp.
        nbf:
          type: integer
          format: int64
        sub:
          type: string
        aud:
          type: string
        iss:
          type: string
        jti:
          type: string

    JWKSet:
      type: object
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kty:
                type: string
                description: Key type (e.g., RSA, EC).
              use:
                type: string
                description: Public key use (sig).
              kid:
                type: string
                description: Key ID.
              alg:
                type: string
                description: Algorithm (e.g., RS256).
              n:
                type: string
                description: RSA modulus (base64url).
              e:
                type: string
                description: RSA exponent (base64url).
            additionalProperties: true

    DeviceAuthorizationResponse:
      type: object
      properties:
        device_code:
          type: string
        user_code:
          type: string
        verification_uri:
          type: string
          format: uri
        verification_uri_complete:
          type: string
          format: uri
        expires_in:
          type: integer
        interval:
          type: integer

    UserInfoResponse:
      type: object
      properties:
        sub:
          type: string
          description: Subject identifier.
        name:
          type: string
        given_name:
          type: string
        family_name:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        phone_number:
          type: string
        phone_number_verified:
          type: boolean
      additionalProperties: true

    OpenIDConfiguration:
      type: object
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        userinfo_endpoint:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri
        registration_endpoint:
          type: string
          format: uri
        scopes_supported:
          type: array
          items:
            type: string
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        subject_types_supported:
          type: array
          items:
            type: string
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        revocation_endpoint:
          type: string
          format: uri
        introspection_endpoint:
          type: string
          format: uri
        end_session_endpoint:
          type: string
          format: uri
        pushed_authorization_request_endpoint:
          type: string
          format: uri
        device_authorization_endpoint:
          type: string
          format: uri
        code_challenge_methods_supported:
          type: array
          items:
            type: string
      additionalProperties: true

    OidcClientRegistrationRequest:
      type: object
      properties:
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
        token_endpoint_auth_method:
          type: string
          enum: [client_secret_basic, client_secret_post, client_secret_jwt, private_key_jwt, none]
        grant_types:
          type: array
          items:
            type: string
        response_types:
          type: array
          items:
            type: string
        client_name:
          type: string
        client_uri:
          type: string
          format: uri
        logo_uri:
          type: string
          format: uri
        scope:
          type: string
        contacts:
          type: array
          items:
            type: string
        tos_uri:
          type: string
          format: uri
        policy_uri:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri
        post_logout_redirect_uris:
          type: array
          items:
            type: string
            format: uri
      additionalProperties: true

    OidcClientRegistrationResponse:
      type: object
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        client_id_issued_at:
          type: integer
          format: int64
        client_secret_expires_at:
          type: integer
          format: int64
        redirect_uris:
          type: array
          items:
            type: string
        token_endpoint_auth_method:
          type: string
        grant_types:
          type: array
          items:
            type: string
        response_types:
          type: array
          items:
            type: string
        client_name:
          type: string
        scope:
          type: string
        registration_access_token:
          type: string
        registration_client_uri:
          type: string
          format: uri
      additionalProperties: true

    # ── Application DTOs ──

    UserLoginDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: User email address.
        password:
          type: string
          format: password
          description: User password.

    UserLoginResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int32
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        accessToken:
          type: string
          description: JWT access token for the authenticated user.
        tokenExpiresAt:
          type: string
          format: date-time
          description: Token expiration timestamp.

    UserRegistrationDto:
      type: object
      required: [username, email, password, firstName, lastName]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    UserRegistrationResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        message:
          type: string
        otpValiditySeconds:
          type: integer
          format: int64
          description: OTP validity duration in seconds.
        timestamp:
          type: string
          format: date-time

    ClientUserRegistrationDto:
      type: object
      required: [username, email, password, firstName, lastName]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    UserEmailVerificationDto:
      type: object
      required: [email, verificationCode]
      properties:
        email:
          type: string
          format: email
        verificationCode:
          type: string
          minLength: 6
          maxLength: 8
          description: OTP code sent to the user's email.

    UserResendOtpDto:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PhoneVerificationDto:
      type: object
      required: [phone, otp, email]
      properties:
        phone:
          type: string
        otp:
          type: string
        email:
          type: string
          format: email

    ResendPhoneOtpDto:
      type: object
      required: [phone, email]
      properties:
        phone:
          type: string
        email:
          type: string
          format: email

    UserForgotPasswordDto:
      type: object
      properties:
        email:
          type: string
          format: email
        forgotPasswordLink:
          type: string
          format: uri
          description: Link that will be included in the password reset email.

    UserResetPasswordDto:
      type: object
      required: [token, newPassword, confirmPassword]
      properties:
        token:
          type: string
          description: Password reset token received via email.
        newPassword:
          type: string
          format: password
        confirmPassword:
          type: string
          format: password

    UserTokenValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
          description: Whether the token is valid.
        message:
          type: string
          description: Descriptive message about the token status.

    ResendOtpResponse:
      type: object
      properties:
        message:
          type: string
        otpValiditySeconds:
          type: integer
          format: int64
        email:
          type: string
          format: email
        timestamp:
          type: string
          format: date-time

    PendingRegistrationResponse:
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        verificationMode:
          type: string
          description: The verification mode for this registration.

    ClientInfoResponse:
      type: object
      properties:
        clientId:
          type: string
        clientName:
          type: string
        logoUri:
          type: string
          format: uri
        scopes:
          type: array
          items:
            type: string
          uniqueItems: true

    CreateClientDto:
      type: object
      required: [clientId, clientSecret]
      properties:
        clientId:
          type: string
        clientSecret:
          type: string
          format: password
        authenticationMethods:
          type: array
          items:
            type: string
          example: [client_secret_basic]
        authorizationGrantTypes:
          type: array
          items:
            type: string
          example: [authorization_code, refresh_token]
        redirectUris:
          type: array
          items:
            type: string
            format: uri
        scopes:
          type: array
          items:
            type: string
        requireProofKey:
          type: boolean
          default: false

    # ── Client Configuration DTOs ──

    CreateApplicationRoleDto:
      type: object
      required: [roleName]
      properties:
        roleName:
