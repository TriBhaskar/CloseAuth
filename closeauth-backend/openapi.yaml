openapi: 3.1.0
info:
  title: CloseAuth Authorization Server API
  description: |
    CloseAuth is an OAuth 2.0 / OpenID Connect 1.0 Authorization Server built on Spring Authorization Server.

    This specification covers:
    - **Spring Authorization Server endpoints** – standard OAuth 2.0 & OIDC protocol endpoints
    - **Admin Auth endpoints** – admin user registration, login, password management
    - **OAuth2 Registration endpoints** – client-scoped user registration during authorization code flow
    - **Admin Approval endpoints** – approve / reject pending user registrations
    - **Client Configuration endpoints** – manage roles, registration configs, themes & theme configurations
    - **OAuth2 Flow endpoints** – client info lookup
    - **Client Management endpoints** – test client creation
  version: 1.0.0
  contact:
    name: CloseAuth Team
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:9088
    description: Local development server

tags:
  - name: OAuth2 Protocol
    description: Standard Spring Authorization Server OAuth 2.0 endpoints
  - name: OpenID Connect
    description: Standard OIDC endpoints (UserInfo, Logout, Client Registration, Discovery)
  - name: Admin Auth
    description: Admin user authentication & account management (login, register, verify, password reset)
  - name: OAuth2 User Registration
    description: Client-scoped user registration during OAuth2 authorization code flow
  - name: Admin Approval
    description: Admin approval / rejection of pending user registrations
  - name: Application Roles
    description: CRUD for client application roles
  - name: Registration Config
    description: Client registration configuration management
  - name: Themes
    description: Client theme management
  - name: Theme Configurations
    description: Key-value configurations attached to a theme
  - name: OAuth2 Flow
    description: Helper endpoints for OAuth2 authorization flows
  - name: Client Management
    description: Client creation (test)

# ──────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────
paths:

  # ============================================
  # SPRING AUTHORIZATION SERVER – OAUTH2
  # ============================================

  /.well-known/openid-configuration:
    get:
      tags: [OpenID Connect]
      operationId: openidConfiguration
      summary: OpenID Connect Discovery
      description: Returns the OpenID Provider metadata (issuer, endpoints, supported grants, etc.).
      responses:
        '200':
          description: Provider metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenIDConfiguration'

  /oauth2/authorize:
    get:
      tags: [OAuth2 Protocol]
      operationId: authorize
      summary: Authorization Endpoint
      description: |
        Initiates the OAuth 2.0 Authorization Code flow.
        The client redirects the user-agent here. After authentication & consent the server
        redirects back to `redirect_uri` with an authorization `code`.
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
          description: Must be `code` for authorization code flow.
        - name: client_id
          in: query
          required: true
          schema:
            type: string
          description: The registered client identifier.
        - name: redirect_uri
          in: query
          required: false
          schema:
            type: string
            format: uri
          description: Must match one of the client's registered redirect URIs.
        - name: scope
          in: query
          required: false
          schema:
            type: string
          description: Space-delimited list of scopes.
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: Opaque value to maintain state between request and callback.
        - name: code_challenge
          in: query
          required: false
          schema:
            type: string
          description: PKCE code challenge.
        - name: code_challenge_method
          in: query
          required: false
          schema:
            type: string
            enum: [S256, plain]
          description: PKCE code challenge method.
        - name: nonce
          in: query
          required: false
          schema:
            type: string
          description: String value used to associate a Client session with an ID Token (OIDC).
      responses:
        '302':
          description: Redirect to login page or back to client with authorization code.
        '400':
          description: Invalid request parameters.

  /oauth2/par:
    post:
      tags: [OAuth2 Protocol]
      operationId: pushedAuthorizationRequest
      summary: Pushed Authorization Request (PAR) Endpoint
      description: |
        RFC 9126 – The client pushes the authorization request payload directly to the
        authorization server and receives a `request_uri` to use at the authorization endpoint.
      security:
        - clientBasic: []
        - clientPost: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [response_type, client_id]
              properties:
                response_type:
                  type: string
                  enum: [code]
                client_id:
                  type: string
                redirect_uri:
                  type: string
                  format: uri
                scope:
                  type: string
                state:
                  type: string
                code_challenge:
                  type: string
                code_challenge_method:
                  type: string
                  enum: [S256, plain]
      responses:
        '201':
          description: PAR accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_uri:
                    type: string
                    description: The request URI to reference at /oauth2/authorize.
                  expires_in:
                    type: integer
                    description: Lifetime of the request_uri in seconds.
        '400':
          description: Invalid request.
        '401':
          description: Client authentication failed.

  /oauth2/token:
    post:
      tags: [OAuth2 Protocol]
      operationId: token
      summary: Token Endpoint
      description: |
        Exchange an authorization code, refresh token, or client credentials for access /
        refresh / ID tokens.
      security:
        - clientBasic: []
        - clientPost: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum:
                    - authorization_code
                    - refresh_token
                    - client_credentials
                    - urn:ietf:params:oauth:grant-type:device_code
                  description: The grant type.
                code:
                  type: string
                  description: Authorization code (authorization_code grant).
                redirect_uri:
                  type: string
                  format: uri
                  description: Must match the URI used in the authorization request.
                refresh_token:
                  type: string
                  description: Refresh token (refresh_token grant).
                scope:
                  type: string
                  description: Space-delimited requested scopes.
                code_verifier:
                  type: string
                  description: PKCE code verifier.
                client_id:
                  type: string
                  description: Client ID (when using client_secret_post).
                client_secret:
                  type: string
                  description: Client secret (when using client_secret_post).
                device_code:
                  type: string
                  description: Device code (device_code grant).
      responses:
        '200':
          description: Token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid grant, code, or request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuth2Error'
        '401':
          description: Client authentication failed.

  /oauth2/revoke:
    post:
      tags: [OAuth2 Protocol]
      operationId: revokeToken
      summary: Token Revocation Endpoint
      description: Revoke an access or refresh token (RFC 7009).
      security:
        - clientBasic: []
        - clientPost: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: The token to revoke.
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
                  description: Hint about the type of the token.
      responses:
        '200':
          description: Token revoked successfully (always 200 per RFC 7009).
        '401':
          description: Client authentication failed.

  /oauth2/introspect:
    post:
      tags: [OAuth2 Protocol]
      operationId: introspectToken
      summary: Token Introspection Endpoint
      description: Introspect a token to determine its active state and metadata (RFC 7662).
      security:
        - clientBasic: []
        - clientPost: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: The token to introspect.
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
      responses:
        '200':
          description: Introspection response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntrospectionResponse'
        '401':
          description: Client authentication failed.

  /oauth2/jwks:
    get:
      tags: [OAuth2 Protocol]
      operationId: jwkSet
      summary: JWK Set Endpoint
      description: Returns the JSON Web Key Set used to verify token signatures.
      responses:
        '200':
          description: JWK Set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKSet'

  /oauth2/device_authorization:
    post:
      tags: [OAuth2 Protocol]
      operationId: deviceAuthorization
      summary: Device Authorization Endpoint
      description: |
        Initiates the OAuth 2.0 Device Authorization Grant (RFC 8628).
        Returns a device code and user code for the device to poll with.
      security:
        - clientBasic: []
        - clientPost: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                scope:
                  type: string
      responses:
        '200':
          description: Device authorization response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAuthorizationResponse'
        '401':
          description: Client authentication failed.

  /oauth2/device_verification:
    get:
      tags: [OAuth2 Protocol]
      operationId: deviceVerification
      summary: Device Verification Endpoint
      description: User-facing page where the end-user enters the user code to authorize a device.
      parameters:
        - name: user_code
          in: query
          required: false
          schema:
            type: string
          description: The user code displayed on the device.
      responses:
        '200':
          description: Device verification page rendered.
        '302':
          description: Redirect after verification.

  # ============================================
  # OIDC ENDPOINTS
  # ============================================

  /userinfo:
    get:
      tags: [OpenID Connect]
      operationId: userInfoGet
      summary: UserInfo Endpoint (GET)
      description: Returns claims about the authenticated end-user (RFC 7519 / OIDC Core §5.3).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: UserInfo claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          description: Missing or invalid access token.
    post:
      tags: [OpenID Connect]
      operationId: userInfoPost
      summary: UserInfo Endpoint (POST)
      description: Returns claims about the authenticated end-user (POST variant).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: UserInfo claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          description: Missing or invalid access token.

  /connect/register:
    post:
      tags: [OpenID Connect]
      operationId: oidcClientRegistration
      summary: OIDC Dynamic Client Registration
      description: |
        Register a new OAuth 2.0 client dynamically (OIDC Dynamic Client Registration 1.0).
        Requires an initial access token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcClientRegistrationRequest'
      responses:
        '201':
          description: Client registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcClientRegistrationResponse'
        '400':
          description: Invalid client metadata.
        '401':
          description: Unauthorized.

  /connect/logout:
    get:
      tags: [OpenID Connect]
      operationId: oidcLogout
      summary: OIDC RP-Initiated Logout
      description: |
        RP-Initiated Logout endpoint (OIDC RP-Initiated Logout 1.0).
        The client redirects the user-agent here to log out.
      parameters:
        - name: id_token_hint
          in: query
          required: false
          schema:
            type: string
          description: Previously issued ID Token as a hint about the user session.
        - name: client_id
          in: query
          required: false
          schema:
            type: string
          description: Client identifier (when id_token_hint is not provided).
        - name: post_logout_redirect_uri
          in: query
          required: false
          schema:
            type: string
            format: uri
          description: URL to redirect the user-agent after logout.
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: Opaque value for state between logout request and callback.
      responses:
        '302':
          description: Redirect to post-logout URI or default logout success page.
        '200':
          description: Logout success page rendered.

  # ============================================
  # ADMIN AUTH ENDPOINTS  (/api/v1/admin/auth/*)
  # ============================================

  /api/v1/admin/auth/login:
    post:
      tags: [Admin Auth]
      operationId: adminLogin
      summary: Admin User Login
      description: |
        Authenticate an admin user with email and password.
        Requires OAuth2 Bearer token with `SCOPE_client.create`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginDto'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
        '401':
          description: Invalid credentials or missing/invalid Bearer token.

  /api/v1/admin/auth/register:
    post:
      tags: [Admin Auth]
      operationId: adminRegister
      summary: Admin User Registration
      description: |
        Register a new admin user. An email OTP will be sent for verification.
        Requires OAuth2 Bearer token with `SCOPE_client.create`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationDto'
      responses:
        '201':
          description: Registration successful, OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistrationResponse'
        '400':
          description: Validation error or user already exists.
        '401':
          description: Missing or invalid Bearer token.

  /api/v1/admin/auth/verify-email:
    post:
      tags: [Admin Auth]
      operationId: adminVerifyEmail
      summary: Verify Admin Email via OTP
      description: Verify the admin user's email address using a one-time password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEmailVerificationDto'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'
        '400':
          description: Invalid or expired OTP.

  /api/v1/admin/auth/resend-otp:
    post:
      tags: [Admin Auth]
      operationId: adminResendOtp
      summary: Resend Email OTP
      description: Resend the email verification OTP to the admin user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserResendOtpDto'
      responses:
        '200':
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendOtpResponse'
        '400':
          description: Validation error.

  /api/v1/admin/auth/forgot-password:
    post:
      tags: [Admin Auth]
      operationId: adminForgotPassword
      summary: Forgot Password
      description: |
        Request a password reset link. Always returns the same response to prevent email enumeration.
        Subject to rate limiting per client IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserForgotPasswordDto'
      responses:
        '200':
          description: Request processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'

  /api/v1/admin/auth/reset-password:
    post:
      tags: [Admin Auth]
      operationId: adminResetPassword
      summary: Reset Password
      description: |
        Reset the user's password using a reset token received via email.
        Subject to rate limiting per client IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserResetPasswordDto'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'
        '400':
          description: Invalid or expired token.
        '429':
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'

  /api/v1/admin/auth/validate-reset-token:
    get:
      tags: [Admin Auth]
      operationId: adminValidateResetToken
      summary: Validate Password Reset Token
      description: |
        Validates a password reset token before showing the reset form.
        Returns whether the token is valid and a descriptive message.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: The password reset token received via email.
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTokenValidationResponse'
        '400':
          description: Token is invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTokenValidationResponse'

  # ============================================
  # OAUTH2 USER REGISTRATION  (/oauth2/register/*)
  # ============================================

  /oauth2/register/{clientId}:
    post:
      tags: [OAuth2 User Registration]
      operationId: oauth2RegisterUser
      summary: Register User for an OAuth2 Client
      description: |
        Register a new user scoped to a specific OAuth2 client during the authorization code flow.
        Requires OAuth2 Bearer token with `SCOPE_client.create`.
        Subject to rate-limiting per client IP.
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          description: The OAuth2 client ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientUserRegistrationDto'
      responses:
        '201':
          description: Registration initiated, verification required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistrationResponse'
        '400':
          description: Validation error.
        '429':
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistrationResponse'

  /oauth2/register/verify-email:
    post:
      tags: [OAuth2 User Registration]
      operationId: oauth2VerifyEmail
      summary: Verify Email OTP (OAuth2 Registration)
      description: |
        Verify the user's email via OTP for the OAuth2 registration flow.
        Requires `SCOPE_client.create`. Subject to rate-limiting.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEmailVerificationDto'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'
        '429':
          description: Too many verification attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'

  /oauth2/register/verify-phone:
    post:
      tags: [OAuth2 User Registration]
      operationId: oauth2VerifyPhone
      summary: Verify Phone OTP (OAuth2 Registration)
      description: |
        Verify the user's phone number via OTP for the OAuth2 registration flow.
        Requires `SCOPE_client.create`. Subject to rate-limiting.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationDto'
      responses:
        '200':
          description: Phone verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'
        '429':
          description: Too many verification attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'

  /oauth2/register/resend-email-otp:
    post:
      tags: [OAuth2 User Registration]
      operationId: oauth2ResendEmailOtp
      summary: Resend Email OTP (OAuth2 Registration)
      description: |
        Resend email verification OTP for OAuth2 registration.
        Requires `SCOPE_client.create`. Subject to rate-limiting.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserResendOtpDto'
      responses:
        '200':
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendOtpResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendOtpResponse'

  /oauth2/register/resend-phone-otp:
    post:
      tags: [OAuth2 User Registration]
      operationId: oauth2ResendPhoneOtp
      summary: Resend Phone OTP (OAuth2 Registration)
      description: |
        Resend phone verification OTP for OAuth2 registration.
        Requires `SCOPE_client.create`. Subject to rate-limiting.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendPhoneOtpDto'
      responses:
        '200':
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendOtpResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendOtpResponse'

  # ============================================
  # ADMIN APPROVAL  (/api/v1/admin/clients/{clientId}/pending-registrations)
  # ============================================

  /api/v1/admin/clients/{clientId}/pending-registrations:
    get:
      tags: [Admin Approval]
      operationId: getPendingRegistrations
      summary: List Pending Registrations
      description: |
        Retrieve all pending user registrations for a client.
        Caller must own the client. Requires `SCOPE_client.create`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      responses:
        '200':
          description: Pending registrations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponsePendingRegistrationList'
        '403':
          description: Client ownership verification failed.

  /api/v1/admin/clients/{clientId}/pending-registrations/count:
    get:
      tags: [Admin Approval]
      operationId: getPendingRegistrationsCount
      summary: Count Pending Registrations
      description: Returns the number of pending registrations for a client.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      responses:
        '200':
          description: Count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseLong'
        '403':
          description: Client ownership verification failed.

  /api/v1/admin/clients/{clientId}/pending-registrations/{email}/approve:
    post:
      tags: [Admin Approval]
      operationId: approveRegistration
      summary: Approve a Pending Registration
      description: Approve a pending user registration. The user account becomes active.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
        - name: email
          in: path
          required: true
          schema:
            type: string
            format: email
          description: Email of the pending registration to approve.
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'
        '403':
          description: Client ownership verification failed.
        '404':
          description: Pending registration not found.

  /api/v1/admin/clients/{clientId}/pending-registrations/{email}/reject:
    post:
      tags: [Admin Approval]
      operationId: rejectRegistration
      summary: Reject a Pending Registration
      description: Reject a pending user registration.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
        - name: email
          in: path
          required: true
          schema:
            type: string
            format: email
          description: Email of the pending registration to reject.
      responses:
        '200':
          description: Rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomApiResponseVoid'
        '403':
          description: Client ownership verification failed.
        '404':
          description: Pending registration not found.

  # ============================================
  # OAUTH2 FLOW – CLIENT INFO  (/oauth2/client-info)
  # ============================================

  /oauth2/client-info:
    get:
